<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoja de Cobro - Business Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .client-card { border-radius: 15px; border-left: 5px solid #2563eb; transition: transform 0.2s; }
        .balance-badge { font-size: 1.1rem; font-weight: bold; color: #dc3545; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold"><i class="bi bi-wallet2 text-primary me-2"></i>Cobros del Día</h2>
            <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">Volver</a>
        </div>

        <div id="loader" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Cargando ruta de cobro...</p>
        </div>

        <div id="cobrosList" class="row g-3">
            <!-- Se llena con JS -->
        </div>
    </div>

    <!-- Modal para Registrar Abono -->
    <div class="modal fade" id="paymentModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Registrar Abono</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="mb-3 text-muted">Cliente: <strong id="modalClientName" class="text-dark"></strong></p>
                    <form id="paymentForm">
                        <input type="hidden" id="modalCreditId">
                        <div class="mb-3">
                            <label class="form-label">Monto del Abono</label>
                            <input type="number" id="payAmount" class="form-control form-control-lg" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Próxima Fecha de Cobro</label>
                            <input type="date" id="nextDate" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nota (Opcional)</label>
                            <textarea id="payNotes" class="form-control" rows="2"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-3">
                            <i class="bi bi-check-circle me-2"></i>Confirmar Pago
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/utils.js"></script>
    <script type="module" src="js/cobros.js"></script>
</body>
</html>
