<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoja de Cobro - Business Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .client-card { 
            border-left: 6px solid #2563eb; 
        }
        .form-control-lg { border-radius: 12px; height: 55px; }
        
        @media (max-width: 576px) {
            h2 { font-size: 1.5rem; }
            /* Hacer que los botones de acción sean más prominentes en móvil */
            .btn-action-group { flex-direction: column; }
            .balance-display { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="content-container">
            <div class="container py-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold"><i class="bi bi-wallet2 text-primary me-2"></i>Cobros del Día</h2>
                    <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">Volver</a>
                </div>

                <div id="collectorStats"></div>

                <div id="loader" class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2 text-muted">Cargando ruta de cobro...</p>
                </div>

                <div id="cobrosList" class="row g-3"></div>

                <div class="mt-5 border-top pt-4 text-center">
                    <button id="closeRouteBtn" class="btn btn-danger w-100 py-3 shadow-sm rounded-3 fw-bold">
                        <i class="bi bi-door-closed me-2"></i>Finalizar Jornada y Cerrar Ruta
                    </button>
                </div>
            </div>
        </div>

        <footer class="main-footer">
            <div class="container">
                <p class="mb-0">&copy; <span id="copyright-year">2026</span> Business Control - Desarrollado por <strong>Cristian David Ruiz</strong>. Todos los derechos reservados.</p>
            </div>
        </footer>
    </div>

    <!-- Modal para Registrar Abono -->
    <div class="modal fade" id="paymentModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Registrar Abono</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="mb-3 text-muted">Cliente: <strong id="modalClientName" class="text-dark"></strong></p>
                    <form id="paymentForm">
                        <input type="hidden" id="modalCreditId">
                        <div class="mb-3">
                            <label class="form-label">Monto del Abono</label>
                            <input type="number" id="payAmount" class="form-control form-control-lg" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Próxima Fecha de Cobro</label>
                            <input type="date" id="nextDate" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nota (Opcional)</label>
                            <textarea id="payNotes" class="form-control" rows="2"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-3">
                            <i class="bi bi-check-circle me-2"></i>Confirmar Pago
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/utils.js"></script>
    <script type="module" src="js/cobros.js"></script>
    <script>
        const yearSpan = document.getElementById('copyright-year');
        if (yearSpan) yearSpan.textContent = new Date().getFullYear();
    </script>
</body>
</html>
