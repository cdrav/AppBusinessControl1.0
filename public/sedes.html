<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Sedes - Business Control</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/toasts.css">
</head>
<body>
  <div class="page-wrapper">
    <div class="content-container">
      <div class="container">
        <!-- Header -->
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 fade-in">
          <div>
            <h2 class="fw-bold text-dark mb-1"><i class="bi bi-shop-window text-primary me-2"></i>Gestión de Sedes</h2>
            <p class="text-muted mb-0">Visualiza el rendimiento de todas tus sedes.</p>
          </div>
          <div class="d-flex gap-2 mt-3 mt-md-0">
            <a href="dashboard.html" class="btn btn-outline-secondary rounded-pill px-3">
                <i class="bi bi-arrow-left me-1"></i> Volver
            </a>
            <a href="configuracion.html#sedes" class="btn btn-primary rounded-pill px-3 admin-only">
                <i class="bi bi-plus-circle me-1"></i> Nueva Sede
            </a>
          </div>
        </div>

        <!-- Contenedor para las tarjetas de las sedes -->
        <div id="branchesGrid" class="row g-4">
            <!-- Estado de carga -->
            <div id="loadingState" class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando sedes...</span>
                </div>
                <p class="mt-2">Cargando sedes...</p>
            </div>

            <!-- Estado vacío -->
            <div id="emptyState" class="col-12 text-center py-5" style="display: none;">
                <div class="alert alert-secondary">
                    <i class="bi bi-shop-window fs-3"></i>
                    <h4 class="alert-heading mt-2">No hay sedes registradas</h4>
                    <p>Agrega tu primera sede desde la sección de Configuración para empezar a gestionar el inventario por separado.</p>
                </div>
            </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/sedes.js"></script>
</body>
</html>
