<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Sedes - Business Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar (Menú de Navegación) -->
        <div id="sidebar-container">
            <!-- El contenido del sidebar se carga dinámicamente -->
        </div>

        <!-- Contenido Principal -->
        <div class="w-100">
            <div class="container-fluid p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="h2 fw-bold">Gestión de Sedes</h1>
                    <a href="configuracion.html#sedes" class="btn btn-primary admin-only">
                        <i class="bi bi-plus-circle me-1"></i> Nueva Sede
                    </a>
                </div>

                <!-- Contenedor para las tarjetas de las sedes -->
                <div id="branchesGrid" class="row g-4">
                    <!-- Estado de carga -->
                    <div id="loadingState" class="col-12 text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Cargando sedes...</span>
                        </div>
                        <p class="mt-2">Cargando sedes...</p>
                    </div>

                    <!-- Estado vacío -->
                    <div id="emptyState" class="col-12 text-center py-5" style="display: none;">
                        <div class="alert alert-secondary">
                            <i class="bi bi-shop-window fs-3"></i>
                            <h4 class="alert-heading mt-2">No hay sedes registradas</h4>
                            <p>Agrega tu primera sede para empezar a gestionar el inventario por separado.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast para notificaciones -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <div id="notification-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/sedes.js"></script>
    <script>
        // Cargar el sidebar y verificar sesión
        document.addEventListener('DOMContentLoaded', function() {
            fetch('sidebar.html').then(res => res.text()).then(data => {
                document.getElementById('sidebar-container').innerHTML = data;
                // Una vez cargado el sidebar, se puede llamar a la función de sesión si está allí
                if (typeof setupUserSession === 'function') setupUserSession();
            });
        });
    </script>
</body>
</html>
